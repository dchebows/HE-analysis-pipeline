name: Debt Market Update

on:
  schedule:
    - cron: '20 23 * * 1-5'   # 23:20 UTC weekdays (~6:20 PM EST). Adjust if you like.
  workflow_dispatch: {}        # lets you run it manually from the Actions tab

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance fredapi pandas numpy python-dateutil

      - name: Run debt market script
        env:
          FRED_KEY: ${{ secrets.FRED_KEY }}
        run: python scripts/debt_market.py

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add debt_market.json debt_series.csv
          git commit -m "Debt market update $(date -u '+%Y-%m-%d %H:%M UTC')" || echo "No changes to commit"
          git push
