name: CFTC COT Update

on:
  schedule:
    # COT releases Friday 3:30 PM ET. Run Saturday 12:00 UTC (~7-8am ET) to be safe.
    - cron: '0 12 * * 6'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas numpy requests

      - name: Run CFTC script
        run: python scripts/cftc.py

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cftc.json cftc.csv
          git commit -m "CFTC COT update $(date -u '+%Y-%m-%d %H:%M UTC')" || echo "No changes to commit"
          git push
