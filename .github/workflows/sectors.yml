name: Sector RRG Update

on:
  schedule:
    - cron: '30 23 * * 1-5'   # 23:30 UTC weekdays (~6:30 PM EST), after market close
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas numpy

      - name: Run sectors script
        run: python scripts/sectors.py

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sectors.json sectors_prices.csv
          git commit -m "Sector RRG update $(date -u '+%Y-%m-%d %H:%M UTC')" || echo "No changes to commit"
          git push
