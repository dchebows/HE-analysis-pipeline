name: Daily CRR Analysis
on:
  schedule:
    - cron: '0 22 * * 1-5'  # 6pm EST Mon-Fri (22:00 UTC)
  workflow_dispatch:

concurrency:
  group: crr-pipeline
  cancel-in-progress: false

jobs:
  crr-analysis:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run CRR Analysis
        run: python CRR_v7.py
        env:
          TZ: America/New_York

      - name: Commit results
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          git add output.csv spx_gamma.json throttle_history.csv
          git diff --staged --quiet || git commit -m "📊 Daily CRR update $(date +'%Y-%m-%d %H:%M EST')"
          git push

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crr-analysis-${{ github.run_number }}
          path: |
            output.csv
            spx_gamma.json
            throttle_history.csv
          retention-days: 30
