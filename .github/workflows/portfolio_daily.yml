name: Portfolio Signals Daily Update
on:
  schedule:
    - cron: '15 22 * * 1-5'  # 6:15pm EST Mon-Fri (22:15 UTC)
  workflow_run:
    workflows: ["Daily CRR Analysis", "ETL Pipeline - Risk Range Data"]
    types:
      - completed
  workflow_dispatch:

concurrency:
  group: etl-portfolio-chain
  cancel-in-progress: false

jobs:
  generate-portfolio-signals:
    runs-on: ubuntu-latest
    # On workflow_run triggers, only proceed if the upstream workflow succeeded.
    # workflow_dispatch and schedule bypass this check so you can run manually anytime.
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy yfinance requests scipy

      - name: Run portfolio orchestrator
        run: python portfolio_orchestrator.py --mode production

      - name: Verify output files
        run: |
          if [ ! -f portfolio_summary.csv ]; then
            echo "ERROR: portfolio_summary.csv not generated"
            exit 1
          fi
          if [ ! -f portfolio_signals.txt ]; then
            echo "ERROR: portfolio_signals.txt not generated"
            exit 1
          fi
          echo "✅ Output files verified"
          echo "📊 Summary CSV rows: $(wc -l < portfolio_summary.csv)"
          echo "📄 Signals TXT size: $(wc -l < portfolio_signals.txt) lines"

      - name: Configure git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Commit and push output files
        run: |
          git add portfolio_summary.csv portfolio_signals.txt position_history.csv
      
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "📊 Portfolio signals update $(date +'%Y-%m-%d %H:%M UTC')"
            git push
            echo "✅ Changes pushed to repository"
          fi

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: portfolio-signals-${{ github.run_number }}
          path: |
            portfolio_summary.csv
            portfolio_signals.txt
          retention-days: 30
